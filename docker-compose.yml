# 简易版 Docker Compose - 适合快速体验
# 生产环境请使用: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  web:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=sqlite:///./data/stock_db.sqlite
    command: >
      sh -c "
        python scripts/init_db.py &&
        python scripts/auto_import.py &&
        python scripts/auto_calc_indicators.py &&
        cd web && streamlit run app.py
      "
