name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      env:
        # Disable progress bar for cleaner logs
        PIP_NO_PROGRESS_BAR: 1
    
    - name: Check Python syntax
      run: |
        python -m py_compile web/pages/dashboard.py
        python -m py_compile web/pages/stock_viewer.py
        python -m py_compile web/pages/screener.py
        python -m py_compile web/pages/backtest.py
        python -m py_compile web/app.py
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test database initialization
      run: |
        python scripts/init_db.py
      env:
        DATABASE_URL: sqlite:///./test.db
    
    - name: Test imports
      run: |
        python -c "from config import get_settings; print('Config OK')"
        python -c "from database import Stock, DailyPrice; print('Models OK')"
        python -c "from collectors import AKShareCollector; print('Collectors OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -t stock-db .
    
    - name: Test Docker image
      run: |
        docker run --rm stock-db python -c "from config import get_settings; print('Docker build OK')"
